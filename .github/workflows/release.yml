# LivingWorld Release
#
# Auto-builds and publishes a GitHub Release whenever a version tag is pushed.
# All releases are marked as **pre-release (beta)** until the project reaches
# a stable milestone.
#
# Trigger:
#   - Push a tag matching v* (e.g. v0.1.0-beta, v26-A-beta.1)
#   - Manual dispatch from the Actions tab (tag_name input required)
#
# Artifacts per platform:
#   - server       (LivingWorld server binary)
#   - worldconvert (world conversion tool)
#   - packconvert  (resource-pack conversion tool)
#
# Platforms: linux-amd64, linux-arm64, windows-amd64, darwin-amd64, darwin-arm64

name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g. v0.1.0-beta)'
        required: true
        type: string

permissions:
  contents: write

env:
  GOFLAGS: '-trimpath'
  TAG: ${{ github.event.inputs.tag_name || github.ref_name }}

jobs:
  # ─── Build all binaries across platforms ───────────────────────────
  build:
    name: build / ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ''
          - goos: linux
            goarch: arm64
            suffix: ''
          - goos: windows
            goarch: amd64
            suffix: '.exe'
          - goos: darwin
            goarch: amd64
            suffix: ''
          - goos: darwin
            goarch: arm64
            suffix: ''

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: download modules
        run: go mod download

      - name: build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
          SUFFIX: ${{ matrix.suffix }}
          LD_FLAGS: '-s -w -X livingworld/internal/version.buildTag=${{ env.TAG }}'
        run: |
          mkdir -p dist
          for cmd in server worldconvert packconvert; do
            echo "==> building $cmd for ${{ matrix.goos }}/${{ matrix.goarch }}"
            go build -ldflags "$LD_FLAGS" -o "dist/${cmd}-${{ matrix.goos }}-${{ matrix.goarch }}${SUFFIX}" "./cmd/${cmd}"
          done

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/
          retention-days: 7

  # ─── Package & publish the release ─────────────────────────────────
  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for changelog generation

      - name: download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: list downloaded artifacts
        run: find artifacts -type f | sort

      # ── Create per-platform archives ────────────────────────────────
      - name: package archives
        run: |
          mkdir -p release

          # Linux archives (.tar.gz)
          for arch in amd64 arm64; do
            tar -czf "release/livingworld-linux-${arch}.tar.gz" \
              -C artifacts "server-linux-${arch}" \
              -C artifacts "worldconvert-linux-${arch}" \
              -C artifacts "packconvert-linux-${arch}" \
              2>/dev/null || true
          done

          # macOS archives (.tar.gz)
          for arch in amd64 arm64; do
            tar -czf "release/livingworld-darwin-${arch}.tar.gz" \
              -C artifacts "server-darwin-${arch}" \
              -C artifacts "worldconvert-darwin-${arch}" \
              -C artifacts "packconvert-darwin-${arch}" \
              2>/dev/null || true
          done

          # Windows archives (.zip)
          for arch in amd64; do
            cd artifacts
            zip "../release/livingworld-windows-${arch}.zip" \
              "server-windows-${arch}.exe" \
              "worldconvert-windows-${arch}.exe" \
              "packconvert-windows-${arch}.exe" \
              2>/dev/null || true
            cd ..
          done

          ls -lh release/

      # ── Generate auto changelog ─────────────────────────────────────
      - name: generate changelog
        id: changelog
        run: |
          # Get the previous tag for changelog range
          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")

          echo "## What's Changed" > release_notes.md
          echo "" >> release_notes.md

          if [ -n "$PREV_TAG" ]; then
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}" >> release_notes.md
            echo "" >> release_notes.md
            echo "### Commits" >> release_notes.md
            git log "${PREV_TAG}..${TAG}" --pretty=format:"- %s (%h)" >> release_notes.md
          else
            echo "First release — no previous tag found." >> release_notes.md
            echo "" >> release_notes.md
            echo "### Recent Commits" >> release_notes.md
            git log -20 --pretty=format:"- %s (%h)" >> release_notes.md
          fi

          echo "" >> release_notes.md
          echo "" >> release_notes.md
          echo "> **Note:** This is a **beta** pre-release. Expect bugs and breaking changes." >> release_notes.md

          cat release_notes.md

      # ── Create the GitHub Release (pre-release / beta) ──────────────
      - name: create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: 'LivingWorld ${{ env.TAG }} (Beta)'
          body_path: release_notes.md
          prerelease: true          # ← always mark as pre-release (beta)
          draft: false
          files: |
            release/livingworld-linux-amd64.tar.gz
            release/livingworld-linux-arm64.tar.gz
            release/livingworld-darwin-amd64.tar.gz
            release/livingworld-darwin-arm64.tar.gz
            release/livingworld-windows-amd64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
